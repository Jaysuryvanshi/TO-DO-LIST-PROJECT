<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINI TODO-LIST PROJECT MINOR</title>
    <link rel="stylesheet" href="index.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Saira:ital,wght@0,100..900;1,100..900&display=swap');

        body {

            font-family: 'Saira', sans-serif;
        }
    </style>

<body>
    <!-- =================BACKGROUND VIDEO====================== -->
    <video class="bg-video" autoplay muted loop playsinline poster="fallback.jpg">
        <source src="video5.mp4" type="video/mp4">
    </video>
    <!-- ========================================================== -->

    <!-- =============== HEADING TODO LIST TITLE====================================== -->
    <div class="jay">

        <div class="heading-title">
            <h1>TO DO-LIST</h1>
        </div>


        <!-- =========================================================================== -->
        <!-- ===================TEXT AREA INPUT=============================================== -->
        <div class="text-container">
            <div class="input-area">
                <textarea name="text" class="textarea" onchange="UpperCase()"></textarea>

                <button type="button" class="buttoninput"><i class="fa-solid fa-check"></i></button>
            </div>
        </div>
    </div>
    <!-- ======================================================================= -->

    <!-- ======================= WHERE TASKS WILL APPEAR ==================================== -->
    <div id="todo" class="todolist">

    </div>
     <!-- ======================================================================= -->
    <script src="index.js"></script>


</body>

</html>
